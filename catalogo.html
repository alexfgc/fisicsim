<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo — FISICSIM</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- OVERLAY: fondo oscuro en móvil al abrir la barra -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- BARRA LATERAL -->
  <aside class="sidebar" id="sidebar">
    <p class="sidebar-titulo">Asignaturas</p>
    <div id="sidebar-links"></div>
  </aside>

  <!-- BOTÓN PARA ABRIR/CERRAR -->
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Abrir navegación">
    <span>Áreas</span>
  </button>

  <!-- CABECERA -->
  <header class="site-header">
    <span class="logo">FISICSIM</span>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="catalogo.html">Catálogo</a>
    </nav>
  </header>

  <main class="catalogo-main">
    <div class="catalogo-header">
      <h1>Catálogo de simulaciones</h1>
      <p>Selecciona una simulación para visualizarla e interactuar con ella.</p>
    </div>
    <div id="catalogo-contenido"></div>
  </main>

  <footer class="site-footer">
    <p>FISICSIM · Grado en Física · UCLM</p>
  </footer>

  <!-- SCRIPT 1: array central -->
  <script src="simulaciones.js"></script>

  <!-- SCRIPT 2: generación del catálogo -->
  <script>
    const asignaturas = [...new Set(SIMULACIONES.map(s => s.asignatura))];
    const contenedor  = document.getElementById("catalogo-contenido");

    asignaturas.forEach(asignatura => {
      const simsDeEstaAsignatura = SIMULACIONES.filter(
        s => s.asignatura === asignatura
      );

      const seccion = document.createElement("section");
      seccion.className = "catalogo-seccion";
      seccion.id = asignatura; // ← permite el scroll desde la portada

      seccion.innerHTML = `
        <h2 class="seccion-titulo">${asignatura}</h2>
        <div class="sims-grid">
          ${simsDeEstaAsignatura.map(sim => `
            <a href="sims/${sim.id}/index.html" class="sim-card">
              <div class="sim-card-preview">
                <span class="sim-preview-icon">⟳</span>
              </div>
              <div class="sim-card-body">
                <h3 class="sim-card-nombre">${sim.nombre}</h3>
                <p class="sim-card-desc">${sim.descripcion}</p>
                <div class="sim-card-tags">
                  ${sim.tags.map(tag => `<span class="tag">${tag}</span>`).join("")}
                </div>
              </div>
            </a>
          `).join("")}
        </div>
      `;

      contenedor.appendChild(seccion);
    });
  </script>

  <!-- SCRIPT 3: barra lateral -->
  <script>
    const sidebar      = document.getElementById("sidebar");
    const toggleBtn    = document.getElementById("sidebar-toggle");
    const overlay      = document.getElementById("sidebar-overlay");
    const sidebarLinks = document.getElementById("sidebar-links");

    asignaturas.forEach(asignatura => {
      const btn = document.createElement("button");
      btn.className = "sidebar-link";
      btn.textContent = asignatura;

      btn.addEventListener("click", () => {
        const destino = document.getElementById(asignatura);
        if (destino) destino.scrollIntoView({ behavior: "smooth", block: "start" });
        if (window.innerWidth < 768) cerrarSidebar();
      });

      sidebarLinks.appendChild(btn);
    });

    function abrirSidebar() {
      sidebar.classList.add("abierta");
      toggleBtn.classList.add("desplazado");
      overlay.classList.add("visible");
    }

    function cerrarSidebar() {
      sidebar.classList.remove("abierta");
      toggleBtn.classList.remove("desplazado");
      overlay.classList.remove("visible");
    }

    toggleBtn.addEventListener("click", () => {
      sidebar.classList.contains("abierta") ? cerrarSidebar() : abrirSidebar();
    });

    overlay.addEventListener("click", cerrarSidebar);

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const nombre = entry.target.textContent;
          document.querySelectorAll(".sidebar-link").forEach(link => {
            link.classList.toggle("activo", link.textContent === nombre);
          });
        }
      });
    }, { threshold: 0.8 });

    document.querySelectorAll(".seccion-titulo").forEach(el => observer.observe(el));

    // Scroll automático si la URL tiene un ancla
    const ancla = decodeURIComponent(window.location.hash.slice(1));
    if (ancla) {
      const destino = document.getElementById(ancla);
      if (destino) {
        setTimeout(() => {
          destino.scrollIntoView({ behavior: "smooth", block: "start" });
        }, 100);
      }
    }
  </script>

</body>
</html>
